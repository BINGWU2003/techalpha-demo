<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechAlpha - 报告库</title>
  <style>
    *{box-sizing:border-box}
    :root{
      --bg:#f4f7fb;--nav:#0b1730;--blue:#2f6df6;--blue2:#edf4ff;--green:#18a957;--green2:#eaf8f0;--orange:#f59e0b;--orange2:#fff7e8;--text:#102039;--muted:#718096;--line:#e3ebf6;--card:#fff;--shadow:0 12px 34px rgba(18,39,80,.06);--radius:24px
    }
    body{margin:0;font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;background:var(--bg);color:var(--text)}
    .app{display:grid;grid-template-columns:236px 1fr;min-height:100vh}
    .sidebar{background:linear-gradient(180deg,#081832,#0a142b);color:#fff;padding:18px 12px;display:flex;flex-direction:column}
    .logo{padding:4px 8px 18px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:16px}
    .logo h1{margin:0;font-size:25px;line-height:1}.logo p{margin:5px 0 0;font-size:11px;letter-spacing:.8px;color:rgba(255,255,255,.62)}
    .nav{display:grid;gap:8px}.nav a{color:rgba(255,255,255,.82);text-decoration:none;padding:12px 14px;border-radius:12px;font-size:14px;font-weight:700;display:flex;gap:10px;align-items:center}.nav a.active{background:var(--blue);color:#fff;box-shadow:0 8px 20px rgba(47,109,246,.28)}.ico{width:16px;height:16px;border:1.5px solid currentColor;border-radius:4px}
    .recent-title{margin:22px 8px 10px;font-size:12px;color:rgba(255,255,255,.52)}.recent{font-size:12px;line-height:1.45;color:rgba(255,255,255,.72);padding:9px 10px;border-radius:10px;background:rgba(255,255,255,.035);margin-bottom:7px}.footer{margin-top:auto;padding-top:14px;border-top:1px solid rgba(255,255,255,.08);font-size:12px;color:rgba(255,255,255,.62)}
    .page{padding:34px 36px 44px}.shell{max-width:1440px;margin:0 auto}.canvas{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}.head{padding:30px 28px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff 0%,#fbfdff 100%)}h1{margin:0;font-size:34px;letter-spacing:-.5px;line-height:1.2}.desc{margin-top:10px;color:var(--muted);font-size:14px}.stats{display:flex;flex-wrap:wrap;gap:10px;margin-top:18px}.stat{padding:8px 12px;border-radius:999px;background:#f6f9fd;border:1px solid #e6edf7;color:#536177;font-size:13px;font-weight:800}.stat strong{color:var(--blue);font-size:16px;margin-left:3px}
    .tools{padding:20px 24px 16px;border-bottom:1px solid var(--line);background:#fff}.quick{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}.chip{border:1px solid #dce6f6;background:#fff;color:#4d5b73;padding:9px 13px;border-radius:999px;font-size:13px;font-weight:800;cursor:pointer}.chip.active{background:var(--blue2);border-color:#bdd1ff;color:var(--blue)}.chip span{color:#8a96aa;margin-left:3px}.filters{display:grid;grid-template-columns:minmax(260px,1.6fr) repeat(2,minmax(150px,1fr)) 150px;gap:10px}select,.search{height:42px;border:1px solid var(--line);border-radius:12px;background:#fff;padding:0 12px;color:#3f4d65;font-size:13px;outline:none;font-family:inherit}.search{padding:0 14px}select:focus,.search:focus{border-color:#a9c2ff;box-shadow:0 0 0 4px rgba(47,109,246,.08)}
    .result-line{display:flex;justify-content:space-between;align-items:center;gap:18px;padding:13px 24px;border-bottom:1px solid var(--line);color:#536177;font-size:13px;background:#fbfdff}.result-line strong{color:var(--text)}table{width:100%;border-collapse:collapse;table-layout:fixed;background:#fff}th{text-align:left;font-size:12px;color:#7a8699;font-weight:900;padding:14px 18px;border-bottom:1px solid var(--line);background:#fbfcff}td{padding:18px;border-bottom:1px solid #eef3fa;vertical-align:middle;font-size:14px}.report-row{cursor:pointer;transition:.16s ease}.report-row:hover{background:#f7faff}.report-row:hover .open-arrow{opacity:1;transform:translateX(0)}.name{font-weight:900;font-size:15px;line-height:1.45}.sub{margin-top:5px;color:#8a96a8;font-size:12px}.tag{display:inline-flex;align-items:center;border-radius:999px;padding:6px 9px;font-size:12px;font-weight:900;color:var(--blue);background:var(--blue2)}.tag.green{background:var(--green2);color:var(--green)}.source,.time{color:#43506a;font-size:13px;line-height:1.6}.open-cell{text-align:right;color:#7e8aa0}.open-arrow{display:inline-flex;width:30px;height:30px;align-items:center;justify-content:center;border-radius:10px;background:var(--blue2);color:var(--blue);font-weight:900;opacity:.55;transform:translateX(-3px);transition:.16s ease}.empty{text-align:center;padding:42px;color:#8792a6}
    @media(max-width:1100px){.app{grid-template-columns:1fr}.sidebar{display:none}.page{padding:24px 18px}.filters{grid-template-columns:1fr 1fr}}@media(max-width:760px){.filters{grid-template-columns:1fr}.result-line{align-items:flex-start;flex-direction:column}table,thead,tbody,tr,td{display:block;width:100%}thead{display:none}.report-row{padding:14px 16px;border-bottom:1px solid #eef3fa}td{padding:7px 0;border-bottom:none}.open-cell{text-align:left}.open-arrow{display:none}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><h1>TechAlpha</h1><p>AI INVESTMENT OS</p></div>
    <nav class="nav">
      <a href="./new_task_business_minimal_v2.html"><span class="ico"></span>新建任务</a>
      <a href="./company_library_clean.html"><span class="ico"></span>企业库</a>
      <a class="active" href="#"><span class="ico"></span>报告库</a>
      <a href="#"><span class="ico"></span>跟踪预警</a>
    </nav>
    <div class="recent-title">最近报告</div>
    <div class="recent">深圳时识科技有限公司初筛报告</div>
    <div class="recent">浙江钠创新能源初筛报告</div>
    <div class="recent">中科海钠初筛报告</div>
    <div class="footer">AI 引擎已就绪</div>
  </aside>

  <main class="page">
    <div class="shell">
      <section class="canvas">
        <header class="head">
          <h1>报告库</h1>
          <div class="desc">管理已生成的企业初筛报告。点击报告行打开独立报告页，导出PDF等操作在报告页完成。</div>
          <div class="stats">
            <span class="stat">全部报告<strong>38</strong></span>
            <span class="stat">关联企业<strong>24</strong></span>
            <span class="stat">本周生成<strong>9</strong></span>
          </div>
        </header>

        <div class="tools">
          <div class="quick" id="quick">
            <button class="chip active" data-filter="全部">全部报告<span>38</span></button>
            <button class="chip" data-filter="本周生成">本周生成<span>9</span></button>
            <button class="chip" data-filter="钠电池">钠电池<span>12</span></button>
            <button class="chip" data-filter="存算一体">存算一体<span>8</span></button>
          </div>
          <div class="filters">
            <input class="search" id="search" placeholder="搜索报告名称、企业或方向" />
            <select id="direction">
              <option>全部方向</option>
              <option>钠电池正极材料</option>
              <option>存算一体</option>
              <option>机器人灵巧手</option>
            </select>
            <select id="source">
              <option>全部来源</option>
              <option>企业探索生成</option>
              <option>企业库生成</option>
            </select>
            <select id="sort">
              <option>最近生成</option>
              <option>企业名称</option>
            </select>
          </div>
        </div>

        <div class="result-line">
          <div><strong id="count">当前结果：5份</strong>｜点击整行打开报告</div>
          <div>当前仅展示初筛报告</div>
        </div>

        <table>
          <thead>
            <tr>
              <th style="width:31%">报告名称</th>
              <th style="width:20%">关联企业</th>
              <th style="width:18%">关注方向</th>
              <th style="width:17%">生成来源</th>
              <th style="width:10%">生成时间</th>
              <th style="width:54px"></th>
            </tr>
          </thead>
          <tbody id="list"></tbody>
        </table>
      </section>
    </div>
  </main>
</div>

<script>
const reports=[
  {id:1,title:'深圳时识科技有限公司初筛报告',company:'深圳时识科技有限公司',direction:'存算一体',source:'企业探索生成',time:'今天',weekly:true},
  {id:2,title:'浙江钠创新能源初筛报告',company:'浙江钠创新能源',direction:'钠电池正极材料',source:'企业探索生成',time:'今天',weekly:true},
  {id:3,title:'中科海钠初筛报告',company:'中科海钠',direction:'钠电池正极材料',source:'企业库生成',time:'昨天',weekly:true},
  {id:4,title:'某新材料科技公司初筛报告',company:'某新材料科技公司',direction:'钠电池正极材料',source:'企业库生成',time:'3天前',weekly:true},
  {id:5,title:'机器人灵巧手企业初筛报告',company:'灵巧手科技',direction:'机器人灵巧手',source:'企业探索生成',time:'上周',weekly:false}
];
let active='全部';
const list=document.getElementById('list');
function data(){
  const q=document.getElementById('search').value.trim();
  const d=document.getElementById('direction').value;
  const s=document.getElementById('source').value;
  return reports.filter(r=>
    (active==='全部'||(active==='本周生成'&&r.weekly)||(active==='钠电池'&&r.direction.includes('钠电池'))||(active==='存算一体'&&r.direction.includes('存算一体'))) &&
    (d==='全部方向'||r.direction===d) &&
    (s==='全部来源'||r.source===s) &&
    (!q||r.title.includes(q)||r.company.includes(q)||r.direction.includes(q))
  );
}
function render(){
  const rows=data();
  document.getElementById('count').textContent=`当前结果：${rows.length}份`;
  if(!rows.length){
    list.innerHTML='<tr><td colspan="6" class="empty">当前条件下暂无报告</td></tr>';
    return;
  }
  list.innerHTML=rows.map(r=>`<tr class="report-row" data-id="${r.id}">
    <td><div class="name">${r.title}</div><div class="sub">独立报告页支持导出PDF</div></td>
    <td><span class="tag">${r.company}</span></td>
    <td><span class="tag green">${r.direction}</span></td>
    <td><div class="source">${r.source}</div></td>
    <td><div class="time">${r.time}</div></td>
    <td class="open-cell"><span class="open-arrow">›</span></td>
  </tr>`).join('');
  document.querySelectorAll('.report-row').forEach(el=>el.onclick=()=>{location.href='./screening_report_clean_v3.html'});
}
document.getElementById('quick').onclick=e=>{
  const c=e.target.closest('.chip');
  if(!c)return;
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');
  active=c.dataset.filter;
  render();
};
['search','direction','source','sort'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
  document.getElementById(id).addEventListener('change',render);
});
render();
</script>
</body>
</html>
