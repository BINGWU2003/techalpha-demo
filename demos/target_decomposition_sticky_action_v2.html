<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechAlpha - 目标拆解</title>
  <style>
    *{box-sizing:border-box}
    :root{
      --bg:#f4f7fb;
      --card:#fff;
      --text:#13213a;
      --muted:#6d7890;
      --line:#e3ebf6;
      --blue:#2f6df6;
      --blue-2:#edf4ff;
      --green:#18a957;
      --green-2:#eaf8f0;
      --orange:#f59e0b;
      --orange-2:#fff7e6;
      --red:#ef4444;
      --red-2:#fff1f1;
      --shadow:0 12px 34px rgba(18,39,80,.06);
      --radius:24px;
    }

    body{
      margin:0;
      font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .app{
      min-height:100vh;
      display:grid;
      grid-template-columns:240px 1fr;
    }

    .sidebar{
      height:100vh;
      position:sticky;
      top:0;
      background:#081327;
      color:#fff;
      padding:14px 10px;
      display:grid;
      grid-template-rows:auto auto minmax(0,1fr) auto;
    }

    .brand{
      padding:0 6px 20px;
      border-bottom:1px solid rgba(255,255,255,.08);
      margin-bottom:20px;
    }
    .brand .name{font-size:22px;font-weight:800;line-height:1}
    .brand .sub{font-size:12px;color:#82a7ff;letter-spacing:.8px;margin-top:8px}

    .nav{display:flex;flex-direction:column;gap:8px}
    .nav a{
      height:44px;
      border-radius:12px;
      color:#cdd6e7;
      text-decoration:none;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 12px;
      font-size:14px;
      font-weight:700;
    }
    .nav a.active{background:var(--blue);color:#fff;box-shadow:0 8px 22px rgba(47,109,246,.28)}
    .nav a:hover{background:rgba(255,255,255,.06)}
    .nav a.active:hover{background:var(--blue)}
    .nav-icon{
      width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;flex:none;
    }
    .nav-icon svg{
      width:18px;height:18px;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;
    }

    .recent-section{min-height:0;display:flex;flex-direction:column}
    .recent-title{
      margin:28px 8px 10px;
      color:#61708c;
      font-size:12px;
      font-weight:800;
    }
    .recent{display:flex;flex-direction:column;gap:6px;min-height:0;overflow:auto}
    .recent div{
      color:#8fa0bd;
      font-size:12px;
      line-height:1.45;
      padding:8px 10px;
      border-radius:10px;
    }
    .recent div.active{color:#dce7ff;background:rgba(255,255,255,.06)}

    .account-entry{
      border-top:1px solid rgba(255,255,255,.08);
      padding-top:12px;
    }
    .account-card{
      display:flex;
      align-items:center;
      gap:10px;
      padding:9px;
      border-radius:14px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }
    .avatar{
      width:34px;height:34px;border-radius:50%;
      background:linear-gradient(135deg,#2f6df6,#8057ff);
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:900;color:#fff;flex:none;
    }
    .user-name{font-size:13px;font-weight:800;color:#fff;line-height:1.3}
    .user-plan{font-size:12px;color:#a9b9d4;margin-top:3px}

    main{padding:22px 32px 32px}
    .shell{max-width:1240px;margin:0 auto}

    .card{
      background:#fff;
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:18px;
    }

    .page-head{
      height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 24px;
      border-bottom:1px solid var(--line);
    }
    h1{
      margin:0;
      font-size:26px;
      line-height:1.15;
      letter-spacing:-.3px;
    }
    .target{
      color:#8a96a8;
      font-size:13px;
      font-weight:700;
    }
    .target strong{color:#526078}

    .section-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:18px 24px 0;
    }
    .section-head h2{
      margin:0;
      font-size:20px;
      line-height:1.3;
    }
    .count-pill{
      color:var(--blue);
      background:var(--blue-2);
      border:1px solid #c7d8ff;
      border-radius:999px;
      padding:7px 12px;
      font-size:13px;
      font-weight:900;
      white-space:nowrap;
    }

    .selected-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      padding:18px 24px 24px;
    }
    .selected-card,.candidate-card{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:14px;
      transition:.16s ease;
    }
    .selected-card{
      border-color:#7aa2ff;
      box-shadow:0 8px 18px rgba(47,109,246,.08);
      background:linear-gradient(180deg,#fff,#fbfdff);
    }
    .empty-slot{
      min-height:146px;
      border:1px dashed #cfdbea;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#9aa6ba;
      font-size:13px;
      background:#fafcff;
    }

    .card-top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      margin-bottom:10px;
    }
    .direction-label{
      color:#8996aa;
      font-size:12px;
      font-weight:900;
      margin-bottom:8px;
    }
    .direction-name{
      font-weight:900;
      font-size:15px;
      color:#13213a;
      line-height:1.35;
      background:#f7f9fd;
      border-radius:12px;
      padding:10px;
      min-height:42px;
      display:flex;
      align-items:center;
    }
    .direction-desc-label{
      color:#8996aa;
      font-size:12px;
      font-weight:900;
      margin:14px 0 8px;
    }
    .direction-desc{
      color:#5a667c;
      font-size:13px;
      line-height:1.6;
      background:#f7f9fd;
      border-radius:12px;
      padding:10px;
      min-height:58px;
      margin-top:10px;
    }
    .icon-actions{display:flex;gap:7px;align-items:center;flex:none}
    .icon-btn{
      width:30px;
      height:30px;
      border-radius:10px;
      border:1px solid #dce6f6;
      background:#fff;
      color:#6d7890;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      transition:.16s ease;
    }
    .icon-btn:hover{
      transform:translateY(-1px);
      border-color:#b8cdf8;
      color:var(--blue);
      background:#f7faff;
    }
    .icon-btn.red:hover{
      border-color:#ffd5d5;
      color:var(--red);
      background:var(--red-2);
    }
    .icon-btn svg{
      width:16px;
      height:16px;
      stroke:currentColor;
      stroke-width:2;
      fill:none;
      stroke-linecap:round;
      stroke-linejoin:round;
    }
    .add-btn{
      height:30px;
      padding:0 10px;
      border:1px solid #dce6f6;
      background:#fff;
      border-radius:999px;
      color:#3f6cf6;
      font-size:12px;
      font-weight:900;
      cursor:pointer;
      font-family:inherit;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:5px;
    }
    .add-btn:hover{transform:translateY(-1px);border-color:#b8cdf8;background:#f7faff}

    .candidate-module{padding:0}
    .candidate-content{padding:16px 24px 24px}
    .candidate-note{
      color:#8793a7;
      font-size:13px;
      font-weight:700;
    }
    .command-box{
      position:relative;
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:0;
      margin-bottom:16px;
      box-shadow:0 8px 18px rgba(18,39,80,.03);
      overflow:hidden;
    }
    textarea{
      width:100%;
      height:92px;
      resize:vertical;
      border:0;
      padding:16px 118px 16px 16px;
      outline:none;
      color:#25324a;
      line-height:1.6;
      font-family:inherit;
      font-size:13px;
      background:#fff;
      display:block;
    }
    .command-box:focus-within{
      border-color:#a9c2ff;
      box-shadow:0 0 0 4px rgba(47,109,246,.08),0 8px 18px rgba(18,39,80,.03);
    }
    .command-btn{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      height:40px;
      padding:0 14px;
      border:0;
      border-radius:13px;
      background:var(--blue);
      color:#fff;
      font-size:14px;
      font-weight:900;
      cursor:pointer;
      font-family:inherit;
      box-shadow:0 10px 20px rgba(47,109,246,.16);
      white-space:nowrap;
      display:inline-flex;
      align-items:center;
      gap:6px;
    }
    .command-btn:hover{
      transform:translateY(-50%) translateY(-1px);
      box-shadow:0 12px 22px rgba(47,109,246,.22);
    }
    .refresh-icon{
      font-size:15px;
      line-height:1;
      font-weight:900;
    }

    .candidate-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
    }
    .candidate-card:hover{
      border-color:#bdd1ff;
      box-shadow:0 8px 18px rgba(47,109,246,.06);
    }
    .candidate-card .direction-name{background:#f8fafd}
    .candidate-card .direction-desc{background:#f8fafd}

    .task-instruction{
      display:flex;
      align-items:center;
      gap:10px;
      margin:14px 24px 0;
      padding:12px 14px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fbfdff;
      color:#536177;
      font-size:13px;
      line-height:1.6;
    }
    .task-label{
      flex:none;
      color:var(--blue);
      background:var(--blue-2);
      border-radius:999px;
      padding:5px 9px;
      font-weight:900;
      font-size:12px;
    }

    .bottom-bar{
      position:sticky;
      bottom:16px;
      z-index:12;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      margin-top:18px;
      padding:12px 16px;
      color:#647087;
      font-size:13px;
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      border-radius:18px;
      box-shadow:0 14px 34px rgba(18,39,80,.12);
      backdrop-filter:blur(10px);
    }
    .bottom-left{
      display:flex;
      flex-direction:column;
      gap:3px;
    }
    .bottom-left b{
      color:var(--text);
      font-size:14px;
    }
    .bottom-left span{
      color:#8793a7;
      font-size:12px;
    }

    .btn{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:12px;
      height:40px;
      padding:0 14px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      transition:.16s ease;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      white-space:nowrap;
      font-family:inherit;
    }
    .btn:hover{border-color:#cbd8eb;transform:translateY(-1px)}
    .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 10px 20px rgba(47,109,246,.16)}
    .btn.ghost{color:var(--blue);border-color:#d3e1ff;background:#fff}
    .btn:disabled{opacity:.55;cursor:not-allowed;transform:none}

    .toast{
      position:fixed;
      left:50%;
      bottom:28px;
      transform:translateX(-50%) translateY(20px);
      opacity:0;
      pointer-events:none;
      background:#13213a;
      color:#fff;
      padding:10px 14px;
      border-radius:12px;
      font-size:13px;
      font-weight:800;
      transition:.2s ease;
      z-index:40;
      box-shadow:0 16px 40px rgba(0,0,0,.22);
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media(max-width:1180px){
      main{padding:18px}
      .selected-grid{grid-template-columns:1fr}
      .candidate-grid{grid-template-columns:1fr 1fr}
    }
    @media(max-width:760px){
      .app{grid-template-columns:1fr}
      .sidebar{display:none}
      .page-head{height:auto;padding:18px 20px;align-items:flex-start;flex-direction:column}
      .selected-grid,.candidate-content{padding-left:18px;padding-right:18px}
      .section-head{padding-left:18px;padding-right:18px}
      .candidate-grid{grid-template-columns:1fr}
      textarea{padding-right:16px;padding-bottom:68px;height:128px}
      .command-btn{top:auto;bottom:14px;right:14px;transform:none}
      .command-btn:hover{transform:translateY(-1px)}
      .task-instruction{margin-left:18px;margin-right:18px;align-items:flex-start;flex-direction:column}
      .bottom-bar{align-items:stretch;flex-direction:column;bottom:12px}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="name">TechAlpha</div>
        <div class="sub">AI INVESTMENT OS</div>
      </div>

      <nav class="nav">
        <a class="active" href="#">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M12 5v14"></path><path d="M5 12h14"></path><path d="M17 7.5c1.8.8 3 2.6 3 4.5s-1.2 3.7-3 4.5"></path></svg>
          </span>
          <span>新建任务</span>
        </a>
        <a href="#">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M4 7h16M6 7v12h12V7M9 11h6"></path></svg>
          </span>
          <span>企业库</span>
        </a>
        <a href="#">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M7 4h8l3 3v13H7z"></path><path d="M15 4v4h4M9 12h6M9 16h6"></path></svg>
          </span>
          <span>报告库</span>
        </a>
        <a href="#">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M5 12a7 7 0 0112-5l2 2"></path><path d="M19 5v4h-4"></path><path d="M19 12a7 7 0 01-12 5l-2-2"></path><path d="M5 19v-4h4"></path></svg>
          </span>
          <span>事件跟踪</span>
        </a>
      </nav>

      <div class="recent-section">
        <div class="recent-title">最近任务记录</div>
        <div class="recent">
          <div>分析钠电池正极材料赛道机会</div>
          <div class="active">挖掘钠电正极材料核心企业</div>
          <div>生成浙江钠创新能源报告</div>
          <div>挖掘Chiplet方向潜力企业</div>
          <div>跟踪机器人灵巧手企业动态</div>
        </div>
      </div>

      <div class="account-entry">
        <div class="account-card">
          <div class="avatar">W</div>
          <div>
            <div class="user-name">王巍 · 试用版</div>
            <div class="user-plan">初筛 7/10</div>
          </div>
        </div>
      </div>
    </aside>

    <main>
      <div class="shell">
        <section class="card">
          <header class="page-head">
            <h1>目标拆解</h1>
            <div class="target">当前任务：<strong>钠电经济传感器</strong></div>
          </header>

          <div class="task-instruction">
            <span class="task-label">任务指令</span>
            <span>钠电池正极材料方向，关注压实密度、循环寿命、低成本和储能场景。</span>
          </div>

          <div class="section-head">
            <div>
              <h2>已选技术方向</h2>
            </div>
            <div class="count-pill" id="selectedCount">已选 3/3</div>
          </div>
          <div class="selected-grid" id="selectedGrid"></div>
        </section>

        <section class="card candidate-module">
          <div class="section-head">
            <div>
              <h2>候选技术方向</h2>
            </div>
            <div class="candidate-note">更新候选不会影响已选方向</div>
          </div>

          <div class="candidate-content">
            <div class="command-box">
              <textarea id="preferenceInput" placeholder="告诉 AI 你想如何调整候选方向，例如：更关注产业化落地，减少偏材料基础研究的方向">更关注产业路径清晰、成本下降空间明显、已有商业化验证的技术方向。</textarea>
              <button class="command-btn" id="refreshBtn" title="更新候选">
                <span class="refresh-icon">↻</span>
                <span>更新</span>
              </button>
            </div>

            <div class="candidate-grid" id="candidateGrid"></div>
          </div>
        </section>

        <div class="bottom-bar">
          <div class="bottom-left">
            <b id="bottomText">已选择3个技术方向</b>
            <span>已选方向将用于下一步线索分析。</span>
          </div>
          <button class="btn primary" id="nextBtn">进入线索分析 →</button>
        </div>
      </div>
    </main>
  </div>

  <div class="toast" id="toast">最多选择3个技术方向</div>

  <script>
    const initialSelected = [
      { id: 1, name: '层状氧化物正极材料企业', desc: '优先挖掘，产业化路径较清晰。' },
      { id: 2, name: '聚阴离子正极材料企业', desc: '适合寻找技术壁垒型企业。' },
      { id: 3, name: '普鲁士蓝类材料企业', desc: '成本优势明显，商业化需验证。' }
    ];

    const candidateSetA = [
      { id: 4, name: '正极材料包覆改性企业', desc: '关注循环寿命、安全性和稳定性提升。' },
      { id: 5, name: '低成本前驱体企业', desc: '关注规模化制备和成本控制。' },
      { id: 6, name: '储能场景材料企业', desc: '关注长循环、低温性能和工程化应用。' },
      { id: 7, name: '钠电材料回收企业', desc: '关注回收体系和闭环产业链潜力。' }
    ];

    const candidateSetB = [
      { id: 8, name: '层状氧化物高压实企业', desc: '聚焦压实密度、倍率性能和量产指标。' },
      { id: 9, name: '聚阴离子安全型企业', desc: '关注安全性、长循环和储能验证。' },
      { id: 10, name: '低温性能材料企业', desc: '关注低温容量保持率和北方储能应用。' },
      { id: 11, name: '钠电正极添加剂企业', desc: '关注改善循环、倍率和界面稳定性。' }
    ];

    let selected = [...initialSelected];
    let candidates = [...candidateSetA];
    let useB = false;

    const editIcon = `<svg viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z"></path></svg>`;
    const removeIcon = `<svg viewBox="0 0 24 24"><path d="M18 6L6 18"></path><path d="M6 6l12 12"></path></svg>`;
    const addIcon = `<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>`;

    function showToast(text){
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      setTimeout(()=>toast.classList.remove('show'), 1800);
    }

    function render(){
      const selectedGrid = document.getElementById('selectedGrid');
      const candidateGrid = document.getElementById('candidateGrid');
      const selectedCount = document.getElementById('selectedCount');
      const bottomText = document.getElementById('bottomText');

      selectedCount.textContent = `已选 ${selected.length}/3`;
      bottomText.textContent = selected.length > 0 ? `已选择${selected.length}个技术方向` : '请至少选择1个技术方向';

      const selectedCards = selected.map(item => `
        <div class="selected-card">
          <div class="card-top">
            <div style="flex:1">
              <div class="direction-name">${item.name}</div>
            </div>
            <div class="icon-actions">
              <button class="icon-btn" title="编辑" onclick="editDirection(${item.id})">${editIcon}</button>
              <button class="icon-btn red" title="移除" onclick="removeSelected(${item.id})">${removeIcon}</button>
            </div>
          </div>
          <div class="direction-desc">${item.desc}</div>
        </div>
      `).join('');

      const emptySlot = selected.length < 3 ? `
        <div class="empty-slot">可继续选择${3 - selected.length}个候选方向</div>
      ` : '';

      selectedGrid.innerHTML = selectedCards + emptySlot;

      candidateGrid.innerHTML = candidates.map(item => `
        <div class="candidate-card">
          <div class="card-top">
            <div style="flex:1">
              <div class="direction-name">${item.name}</div>
            </div>
            <div class="icon-actions">
              <button class="add-btn" onclick="addCandidate(${item.id})">${addIcon}加入</button>
            </div>
          </div>
          <div class="direction-desc">${item.desc}</div>
        </div>
      `).join('');
    }

    function addCandidate(id){
      if(selected.length >= 3){
        showToast('最多选择3个技术方向');
        return;
      }
      const idx = candidates.findIndex(item => item.id === id);
      if(idx < 0) return;
      const [item] = candidates.splice(idx, 1);
      selected.push(item);
      render();
    }

    function removeSelected(id){
      const idx = selected.findIndex(item => item.id === id);
      if(idx < 0) return;
      const [item] = selected.splice(idx, 1);
      candidates.unshift(item);
      render();
    }

    function editDirection(id){
      const item = selected.find(item => item.id === id);
      if(!item) return;
      const next = prompt('编辑方向名称', item.name);
      if(next && next.trim()){
        item.name = next.trim();
        render();
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', ()=>{
      const selectedIds = new Set(selected.map(item=>item.id));
      const source = useB ? candidateSetA : candidateSetB;
      candidates = source.filter(item => !selectedIds.has(item.id));
      useB = !useB;
      showToast('已更新候选技术方向');
      render();
    });

    document.getElementById('nextBtn').addEventListener('click', ()=>{
      if(selected.length === 0){
        showToast('请至少选择1个技术方向');
        return;
      }
      showToast('进入线索分析');
    });

    render();
  </script>
</body>
</html>
